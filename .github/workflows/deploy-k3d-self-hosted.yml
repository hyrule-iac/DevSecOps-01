name: deploy-k3d-self-hosted

on:
  push:
    branches:
      - main
    paths:
      - "k8s/rollouts/rollout.yaml"
      - "k8s/rollouts/analysis-template.yaml"
      - ".github/workflows/deploy-k3d-self-hosted.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # Definimos el KUBECONFIG global para que todos los pasos lo usen por defecto
      KUBECONFIG: "C:\\k3dconfig\\config"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Apply rollout manifests to local k3d cluster
        shell: powershell
        run: |
          # Usamos la variable de entorno definida en el job
          kubectl apply -f k8s/rollouts/ --validate=false

      - name: Wait for Rollout and Analysis Completion
        shell: powershell
        run: |
          Write-Host "Monitoring Argo Rollout status..."
          # Este comando reemplaza tu loop manual. 
          # Se bloquea hasta que el estado sea 'Healthy' o 'Degraded'.
          # Agregamos un timeout de 10 minutos (600s) por si el análisis es largo.
          kubectl argo rollouts status demo-devsecops-api -n default --timeout 600s

      - name: Final Health Check - Service Availability
        shell: powershell
        run: |
          # Solo ejecutamos esto una vez que el rollout confirmó que está Healthy.
          # Verificamos que el puerto 8086 sea alcanzable desde el host.
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8086/" -UseBasicParsing -Method Get -TimeoutSec 5
            if ($response.StatusCode -eq 200) {
              Write-Host "SUCCESS: FRANKEN-API is reachable at port 8086!"
            }
          } catch {
            Write-Error "ERROR: Rollout is Healthy but Service is unreachable at localhost:8086"
            exit 1
          }