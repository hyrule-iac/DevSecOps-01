apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate-check
spec:
  metrics:
  -name: success-rate
  interval: 30s
  failureLimit: 2
  count: 5
  provider:
    prometheus:
      address: http://prometheus-operated.monitoring.svc.cluster.local:9090
      query: |
        sum(rate(app_business_errors_total[1m]))
        /
        sum(rate(app_interactive_requests_total[m]))
    successCondition: results[0] < 0.05
